services:

  redis:
    image: redis:7-alpine

    container_name: route-redis

    restart: unless-stopped

    ports:
      - "${REDIS_PORT}:6379"

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  route-service:

    build: .

    container_name: route-service

    restart: unless-stopped

    depends_on:
      redis:
        condition: service_healthy

    ports:
      - "${SPRING_PORT}:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:${POSTGRES_PORT}/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:

  redis-data: